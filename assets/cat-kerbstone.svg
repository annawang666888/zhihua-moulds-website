<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-label="Kerbstone Mould">
  <defs>
    <linearGradient id="bg7" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#0f2742"/><stop offset="1" stop-color="#0a1a2e"/></linearGradient>
    <pattern id="grid7" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0H0V20" fill="none" stroke="#1d3557" stroke-width="0.5"/></pattern>
  </defs>
  <rect width="400" height="300" fill="url(#bg7)"/>
  <rect width="400" height="300" fill="url(#grid7)"/>
  <g transform="translate(200 155)" fill="none" stroke="#f59e0b" stroke-width="1.5">
    <!-- 3D kerb block -->
    <path d="M-80,-20 L80,-20 L80,20 L-80,20Z"/>
    <path d="M80,-20 L100,-40 L100,0 L80,20Z" stroke="#3b82f6"/>
    <path d="M-80,-20 L-60,-40 L100,-40 L80,-20Z" stroke="#3b82f6"/>
    <!-- dimensions -->
    <line x1="-80" y1="30" x2="80" y2="30" stroke="#64748b" stroke-dasharray="4 2"/>
    <line x1="-80" y1="20" x2="-80" y2="35" stroke="#64748b"/>
    <line x1="80" y1="20" x2="80" y2="35" stroke="#64748b"/>
    <text x="0" y="45" text-anchor="middle" fill="#64748b" font-family="Inter,Arial" font-size="10" stroke="none">1000 mm</text>
  </g>
  <text x="20" y="30" fill="#e2e8f0" font-family="Inter,Arial" font-size="14" font-weight="700">Kerbstone / Curbstone Mould</text>
  <text x="20" y="48" fill="#64748b" font-family="Inter,Arial" font-size="11">L-Type · Road Edging</text>
</svg>
