<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-label="Slope Protection Mould">
  <defs>
    <linearGradient id="bg4" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#0f2742"/><stop offset="1" stop-color="#0a1a2e"/></linearGradient>
    <pattern id="grid4" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0H0V20" fill="none" stroke="#1d3557" stroke-width="0.5"/></pattern>
  </defs>
  <rect width="400" height="300" fill="url(#bg4)"/>
  <rect width="400" height="300" fill="url(#grid4)"/>
  <g transform="translate(200 160)" fill="none" stroke="#3b82f6" stroke-width="1.5">
    <!-- hexagons honeycomb -->
    <g stroke="#f59e0b">
      <polygon points="-50,-30 -25,-45 0,-30 0,0 -25,15 -50,0"/>
      <polygon points="0,-30 25,-45 50,-30 50,0 25,15 0,0"/>
      <polygon points="-50,30 -25,15 0,30 0,60 -25,75 -50,60"/>
      <polygon points="0,30 25,15 50,30 50,60 25,75 0,60"/>
    </g>
    <g stroke="#3b82f6">
      <polygon points="-100,0 -75,-15 -50,0 -50,30 -75,45 -100,30"/>
      <polygon points="50,0 75,-15 100,0 100,30 75,45 50,30"/>
      <polygon points="-100,-60 -75,-75 -50,-60 -50,-30 -75,-15 -100,-30"/>
      <polygon points="50,-60 75,-75 100,-60 100,-30 75,-15 50,-30"/>
    </g>
  </g>
  <text x="20" y="30" fill="#e2e8f0" font-family="Inter,Arial" font-size="14" font-weight="700">Slope Protection Mould</text>
  <text x="20" y="48" fill="#64748b" font-family="Inter,Arial" font-size="11">Hexagonal · Erosion Control</text>
</svg>
